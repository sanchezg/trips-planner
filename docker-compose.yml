services:
  db:
    image: postgres:16
    container_name: trips-db
    environment:
      POSTGRES_DB: trips_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trips_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: trips-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/trips_planner}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      TOKEN_ENCRYPTION_SECRET: ${TOKEN_ENCRYPTION_SECRET:-change-me}
      SESSION_COOKIE_NAME: trip_session
      SESSION_COOKIE_DOMAIN:
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      SESSION_MAX_AGE_SECONDS: 604800
      OAUTH_STATE_COOKIE_NAME: trip_oauth_state
      OAUTH_STATE_MAX_AGE_SECONDS: 600
      PYTHONPATH: /app
      WATCHFILES_FORCE_POLLING: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/routes/auth/google/callback}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: trips-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_BASE_URL_INTERNAL: ${API_BASE_URL_INTERNAL:-http://backend:8000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
